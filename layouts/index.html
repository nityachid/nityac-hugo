<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }} — Operator. Builder. Systems thinker.</title>
  <meta name="description" content="Nitya Chidambaram helps teams fix the messy operational challenges that come with growth. 12 years scaling operations across Amazon, Practo, and ShopBack in 13 countries.">
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ .Site.Title }} — Operator. Builder. Systems thinker.">
  <meta property="og:description" content="Helping teams fix the messy operational challenges that come with growth.">
  <meta property="og:image" content="{{ "img/hero.jpg" | absURL }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Nitya Chidambaram",
    "jobTitle": "Operations & Growth Leader",
    "description": "Helps teams fix the messy operational challenges that come with growth. 12 years scaling operations across Amazon, Practo, and ShopBack in 13 countries.",
    "url": "{{ .Permalink }}",
    "knowsAbout": ["Operations","Growth","Systems thinking","AI-driven commerce","Scaling teams"],
    "alumniOf": ["Amazon","Practo","ShopBack"]
  }
  </script>

  <style>
    :root{
      --bone:#faf6f0; --charcoal:#2d2926; --terracotta:#a84e12;
      --teal:#1a4d43; --teal-bright:#008080; --muted:#6b645c;
      --serif:"Libre Caslon Text",Georgia,serif;
      --sans:"Plus Jakarta Sans",system-ui,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bone);color:var(--charcoal);font-family:var(--sans);
      -webkit-font-smoothing:antialiased;line-height:1.65;font-size:15px;}
    a{color:var(--terracotta);text-decoration:none;}
    a:hover{color:var(--teal-bright);}

    .nav{max-width:880px;margin:0 auto;padding:20px 32px;display:flex;
      align-items:center;justify-content:space-between;}
    .logo{font-family:var(--serif);font-weight:700;color:var(--terracotta);
      font-size:18px;letter-spacing:.5px;}
    .nav-links{display:flex;gap:22px;}
    .nav-links a{color:var(--muted);font-size:13px;}
    .nav-links a:hover{color:var(--terracotta);}

    .hero{max-width:880px;margin:0 auto;padding:18px 32px 48px;
      display:grid;grid-template-columns:1fr .68fr;gap:44px;align-items:center;}
    .eyebrow{font-size:11px;font-weight:600;letter-spacing:2px;
      text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
    .hero h1{font-family:var(--serif);font-weight:700;
      font-size:clamp(32px,3.6vw,44px);line-height:1.06;letter-spacing:-.5px;
      color:var(--terracotta);margin-bottom:18px;}
    .hero .lede{font-size:15px;color:#4a463f;max-width:24em;}
    .photo-wrap img{width:100%;height:300px;object-fit:cover;border-radius:8px;
      box-shadow:0 22px 44px -24px rgba(45,41,38,.45);}

    .about{max-width:560px;margin:0 auto;padding:22px 32px 28px;}
    .about h3{font-family:var(--serif);font-weight:700;font-size:19px;
      color:var(--terracotta);margin:30px 0 10px;letter-spacing:-.01em;
      padding-top:22px;border-top:1px solid rgba(45,41,38,.1);}
    .about h3:first-child{border-top:none;padding-top:0;margin-top:0;}
    .about p{font-size:14.5px;color:var(--charcoal);margin-bottom:9px;}
    .about a{color:var(--terracotta);text-decoration:underline;text-underline-offset:2px;}

    .cta-row{max-width:560px;margin:0 auto;padding:8px 32px 70px;display:flex;
      gap:32px;flex-wrap:wrap;border-top:1px solid rgba(45,41,38,.1);
      margin-top:8px;padding-top:26px;}
    .cta-row a{font-weight:600;font-size:14px;letter-spacing:.3px;}

    footer{max-width:560px;margin:0 auto;padding:0 32px 40px;color:var(--muted);
      font-size:12px;}

    @media(max-width:720px){
      .hero{grid-template-columns:1fr;gap:24px;padding-bottom:30px;}
      .photo-wrap{order:-1;}
      .nav-links{gap:16px;}
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="logo" aria-label="Nitya Chidambaram — home">NC</a>
    <span class="nav-links">
      <a href="/essays/">Essays</a>
      <a href="/work/">Work</a>
      <a href="/about/">About</a>
      <a href="/connect/">Connect</a>
    </span>
  </nav>

  <header class="hero">
    <div>
      <p class="eyebrow">Nitya Chidambaram</p>
      <h1>Operator.<br>Builder.<br>Systems thinker.</h1>
      <p class="lede">I help teams fix the messy operational challenges that come
        with growth — rebuilding faster, leaner, smarter.</p>
    </div>
    <div class="photo-wrap">
      <img src="{{ "img/hero.jpg" | relURL }}" alt="Nitya Chidambaram" width="800" height="800">
    </div>
  </header>

  <main class="about">
    {{ .Content }}
  </main>

  <div class="cta-row">
    <a href="/work/">Explore work →</a>
    <a href="/essays/">Read essays →</a>
  </div>

  <footer>
    Built with intent. © 2025 Nitya Chidambaram.
  </footer>
</body>
</html>
